
#user  nobody;
worker_processes 5;

error_log /Applications/ServBay/logs/nginx/error.log;
# error_log  /Applications/ServBay/logs/nginx/notice.log  notice;
# error_log  /Applications/ServBay/logs/nginx/info.log  info;

pid /Applications/ServBay/tmp/nginx.pid;

worker_rlimit_nofile 51200;

events {
    worker_connections 1024;
    multi_accept off;
    accept_mutex off;
}

http {
    include mime.types;
    default_type application/octet-stream;

    server_names_hash_bucket_size 128;
    client_header_buffer_size 32k;
    large_client_header_buffers 4 32k;
    client_max_body_size 50m;

    sendfile on;
    sendfile_max_chunk 512k;
    tcp_nopush on;

    keepalive_timeout 65;

    tcp_nodelay on;

    fastcgi_connect_timeout 300;
    fastcgi_send_timeout 300;
    fastcgi_read_timeout 300;
    fastcgi_buffer_size 64k;
    fastcgi_buffers 4 64k;
    fastcgi_busy_buffers_size 128k;
    fastcgi_temp_file_write_size 256k;

    gzip on;
    gzip_min_length 1k;
    gzip_buffers 4 16k;
    gzip_http_version 1.1;
    gzip_comp_level 2;
    gzip_types text/plain application/javascript application/x-javascript text/javascript text/css application/xml application/xml+rss;
    gzip_vary on;
    gzip_proxied expired no-cache no-store private auth;
    gzip_disable "MSIE [1-6]\.";

    server_tokens off;
    # access_log off;

    server {
        listen 81 default_server;
        server_name servbay.host;

        index index.html index.htm index.php;

        access_log /Applications/ServBay/logs/nginx/default.access.log;

        root /Applications/ServBay/www/servbay;

        include php-fpm-conf.d/enable-php-fpm-default.conf;
    }

    server {
        listen 8443 ssl default_server;
        server_name servbay.host;

        ssl_certificate /Applications/ServBay/ssl/acme/tls-certs/servbay.host/servbay.host.crt;
        ssl_certificate_key /Applications/ServBay/ssl/acme/tls-certs/servbay.host/servbay.host.key;

        index index.html index.htm index.php;

        access_log /Applications/ServBay/logs/nginx/default.access.log;

        root /Applications/ServBay/www/servbay;

        include php-fpm-conf.d/enable-php-fpm-default.conf;
    }

    include vhosts/*.conf;

}
